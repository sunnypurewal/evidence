name: 'evidence'
description: 'Run the evidence CLI on a macOS runner to capture screenshots, build evidence, marketing renders, preview videos, or visual diffs from your iOS app.'
author: 'sunnypurewal'
branding:
  icon: 'camera'
  color: 'purple'

inputs:
  subcommand:
    description: 'evidence subcommand to run (capture-screenshots, capture-evidence, resize, render-marketing, record-preview, diff, help).'
    required: true
  config:
    description: 'Path to the .evidence.toml config file relative to the consuming repo. Defaults to .evidence.toml in the repo root.'
    required: false
    default: '.evidence.toml'
  ticket:
    description: 'Ticket key to pass to capture-evidence (e.g. APP-123). Required when subcommand is capture-evidence.'
    required: false
    default: ''
  baseline-dir:
    description: 'Baseline directory passed to evidence diff (--baseline). Reserved for forthcoming visual diff support.'
    required: false
    default: ''
  output-dir:
    description: 'Directory where evidence writes captured artifacts. Exposed to the CLI via EVIDENCE_OUTPUT_DIR.'
    required: false
    default: ''
  simulator:
    description: 'Optional simulator device name to boot before running (e.g. "iPhone 16 Pro Max"). Falls back to the simulator_udid in .evidence.toml when empty.'
    required: false
    default: ''
  extra-args:
    description: 'Additional CLI flags appended verbatim to the evidence invocation. Use a single quoted string, parsed with shell word-splitting.'
    required: false
    default: ''
  evidence-ref:
    description: 'Git ref of sunnypurewal/evidence to build the CLI from. Defaults to the action ref so the CLI matches the action version.'
    required: false
    default: ''
  comment-on-pr:
    description: 'When true, post a PR comment with thumbnails of artifacts produced by this run. No-op outside pull_request events. Requires github-token.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token used to post PR comments. Pass the calling workflow''s GITHUB_TOKEN secret (see the README "Use in CI" section) to enable the PR comment behaviour. Leave empty to skip commenting.'
    required: false
    default: ''

outputs:
  output-dir:
    description: 'Resolved evidence output directory containing the artifacts produced by this run.'
    value: ${{ steps.run-evidence.outputs.output-dir }}
  artifact-count:
    description: 'Number of image/video artifacts written to the output directory.'
    value: ${{ steps.run-evidence.outputs.artifact-count }}

runs:
  using: 'composite'
  steps:
    - name: Validate runner OS
      shell: bash
      run: |
        if [ "${RUNNER_OS}" != "macOS" ]; then
          echo "::error::evidence-action requires a macOS runner (got '${RUNNER_OS}'). Use 'runs-on: macos-14' or newer."
          exit 1
        fi

    - name: Resolve evidence ref
      id: ref
      shell: bash
      run: |
        ref="${{ inputs.evidence-ref }}"
        if [ -z "${ref}" ]; then
          ref="${GITHUB_ACTION_REF:-main}"
        fi
        echo "ref=${ref}" >> "$GITHUB_OUTPUT"

    - name: Cache Homebrew downloads
      id: brew-cache
      uses: actions/cache@v4
      with:
        # Cache the formula download tarballs and HOMEBREW_API metadata. We
        # intentionally do NOT cache /opt/homebrew/Cellar — restoring those
        # without running `brew link` leaves the binaries un-symlinked from
        # /opt/homebrew/bin, which silently triggers a reinstall on warm runs.
        # The downloads cache alone makes `brew install` skip the network
        # tarball fetch, which is the slow part on macos-14 hosted runners.
        path: |
          ~/Library/Caches/Homebrew/downloads
          ~/Library/Caches/Homebrew/api
        key: evidence-brew-${{ runner.os }}-${{ runner.arch }}-imagemagick-ffmpeg-v2

    - name: Install ImageMagick and ffmpeg
      shell: bash
      run: |
        set -euo pipefail
        missing=()
        command -v magick >/dev/null 2>&1 || missing+=(imagemagick)
        command -v ffmpeg >/dev/null 2>&1 || missing+=(ffmpeg)
        if [ ${#missing[@]} -eq 0 ]; then
          echo "ImageMagick and ffmpeg already installed."
        else
          echo "Installing missing tools: ${missing[*]}"
          brew install "${missing[@]}"
        fi

    - name: Cache evidence build
      id: evidence-cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/evidence-build/.build
        key: evidence-build-${{ runner.os }}-${{ runner.arch }}-${{ steps.ref.outputs.ref }}

    - name: Build evidence CLI
      id: build
      shell: bash
      run: |
        set -euo pipefail
        ref="${{ steps.ref.outputs.ref }}"
        build_dir="${RUNNER_TEMP}/evidence-build"
        mkdir -p "${build_dir}"
        if [ ! -d "${build_dir}/.git" ]; then
          git clone --depth 1 --branch "${ref}" https://github.com/sunnypurewal/evidence.git "${build_dir}" \
            || git clone https://github.com/sunnypurewal/evidence.git "${build_dir}"
          git -C "${build_dir}" checkout "${ref}" || true
        fi
        cd "${build_dir}"
        swift build -c release --product evidence
        cli_path="$(swift build -c release --product evidence --show-bin-path)/evidence"
        if [ ! -x "${cli_path}" ]; then
          echo "::error::evidence CLI not produced at ${cli_path}"
          exit 1
        fi
        echo "cli=${cli_path}" >> "$GITHUB_OUTPUT"
        echo "build-dir=${build_dir}" >> "$GITHUB_OUTPUT"

    - name: Boot simulator
      id: simulator
      shell: bash
      env:
        DEVICE_NAME: ${{ inputs.simulator }}
      run: |
        set -euo pipefail
        booted_udid=""
        if [ -n "${DEVICE_NAME}" ]; then
          # Resolve the UDID for the requested device name from `simctl list`.
          devices_json="$(xcrun simctl list devices available -j)"
          booted_udid="$(DEVICES_JSON="${devices_json}" DEVICE_NAME="${DEVICE_NAME}" python3 - <<'PY'
        import json, os, sys
        data = json.loads(os.environ["DEVICES_JSON"])
        target = os.environ["DEVICE_NAME"]
        for _runtime, devices in data.get("devices", {}).items():
            for d in devices:
                if d.get("name") == target and d.get("isAvailable", True):
                    print(d["udid"])
                    sys.exit(0)
        sys.exit(1)
        PY
        )" || true
          if [ -z "${booted_udid}" ]; then
            echo "::warning::Simulator named '${DEVICE_NAME}' not found; falling back to .evidence.toml simulator_udid."
          else
            xcrun simctl boot "${booted_udid}" >/dev/null 2>&1 || true
            echo "Booted simulator ${DEVICE_NAME} (${booted_udid})."
          fi
        fi
        echo "udid=${booted_udid}" >> "$GITHUB_OUTPUT"

    - name: Run evidence
      id: run-evidence
      shell: bash
      env:
        EVIDENCE_CLI: ${{ steps.build.outputs.cli }}
        EVIDENCE_SUBCOMMAND: ${{ inputs.subcommand }}
        EVIDENCE_CONFIG: ${{ inputs.config }}
        EVIDENCE_TICKET: ${{ inputs.ticket }}
        EVIDENCE_BASELINE_DIR: ${{ inputs.baseline-dir }}
        EVIDENCE_OUTPUT_DIR_INPUT: ${{ inputs.output-dir }}
        EVIDENCE_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail
        cli="${EVIDENCE_CLI}"
        subcommand="${EVIDENCE_SUBCOMMAND}"

        if [ "${subcommand}" = "help" ] || [ "${subcommand}" = "--help" ]; then
          "${cli}" --help
          echo "output-dir=" >> "$GITHUB_OUTPUT"
          echo "artifact-count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        config_path="${EVIDENCE_CONFIG:-.evidence.toml}"
        if [ ! -f "${config_path}" ]; then
          echo "::error::Could not find evidence config at '${config_path}'. Pass 'config:' or commit a .evidence.toml."
          exit 1
        fi
        # The CLI reads .evidence.toml from the working directory.
        config_dir="$(cd "$(dirname "${config_path}")" && pwd)"
        cd "${config_dir}"

        args=("${subcommand}")
        case "${subcommand}" in
          capture-evidence)
            if [ -z "${EVIDENCE_TICKET}" ]; then
              echo "::error::capture-evidence requires the 'ticket' input."
              exit 1
            fi
            args+=("--ticket" "${EVIDENCE_TICKET}")
            ;;
          diff)
            if [ -n "${EVIDENCE_BASELINE_DIR}" ]; then
              args+=("--baseline" "${EVIDENCE_BASELINE_DIR}")
            fi
            ;;
        esac

        if [ -n "${EVIDENCE_EXTRA_ARGS}" ]; then
          # shellcheck disable=SC2206
          extra=(${EVIDENCE_EXTRA_ARGS})
          args+=("${extra[@]}")
        fi

        if [ -n "${EVIDENCE_OUTPUT_DIR_INPUT}" ]; then
          mkdir -p "${EVIDENCE_OUTPUT_DIR_INPUT}"
          export EVIDENCE_OUTPUT_DIR="${EVIDENCE_OUTPUT_DIR_INPUT}"
        fi

        echo "Running: ${cli} ${args[*]}"
        "${cli}" "${args[@]}"

        resolved_output_dir="${EVIDENCE_OUTPUT_DIR:-}"
        if [ -z "${resolved_output_dir}" ]; then
          # Match CLI fallbacks: APPSTORE_SCREENSHOT_DIR, then the configured evidence_dir.
          if [ -n "${APPSTORE_SCREENSHOT_DIR:-}" ]; then
            resolved_output_dir="${APPSTORE_SCREENSHOT_DIR}"
          else
            resolved_output_dir="$(awk -F '[ =]+' '/^evidence_dir/{gsub(/"/,"",$2); print $2; exit}' "${config_path}")"
            resolved_output_dir="${resolved_output_dir:-docs/build-evidence}"
          fi
        fi

        artifact_count=0
        if [ -d "${resolved_output_dir}" ]; then
          # `wc -l` consumes the full stream, so pipefail is safe here. Strip
          # whitespace so the value is a clean integer for downstream comparisons.
          raw_count="$(find "${resolved_output_dir}" -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.mp4' -o -iname '*.mov' \) | wc -l)"
          artifact_count="$(echo "${raw_count}" | tr -d '[:space:]')"
        fi
        echo "output-dir=${resolved_output_dir}" >> "$GITHUB_OUTPUT"
        echo "artifact-count=${artifact_count}" >> "$GITHUB_OUTPUT"

    - name: Comment on PR
      if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' && inputs.github-token != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        EVIDENCE_OUTPUT_DIR_RESOLVED: ${{ steps.run-evidence.outputs.output-dir }}
        EVIDENCE_SUBCOMMAND: ${{ inputs.subcommand }}
        EVIDENCE_ARTIFACT_COUNT: ${{ steps.run-evidence.outputs.artifact-count }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -uo pipefail
        if [ "${EVIDENCE_ARTIFACT_COUNT:-0}" = "0" ]; then
          echo "No artifacts produced; skipping PR comment."
          exit 0
        fi
        out_dir="${EVIDENCE_OUTPUT_DIR_RESOLVED}"
        if [ -z "${out_dir}" ] || [ ! -d "${out_dir}" ]; then
          echo "Output directory '${out_dir}' missing; skipping PR comment."
          exit 0
        fi

        body_file="${RUNNER_TEMP}/evidence-pr-comment.md"
        artifacts_file="${RUNNER_TEMP}/evidence-artifacts.txt"
        # Collect up to 16 artifact paths into a tmpfile so SIGPIPE from `head`
        # cannot break the surrounding pipefail-protected pipeline.
        find "${out_dir}" -type f \
          \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.mp4' -o -iname '*.mov' \) \
          > "${artifacts_file}.all" || true
        head -16 "${artifacts_file}.all" > "${artifacts_file}" || true

        {
          echo "### evidence: ${EVIDENCE_SUBCOMMAND}"
          echo
          echo "Captured ${EVIDENCE_ARTIFACT_COUNT} artifact(s) on ${RUNNER_OS} (run ${GITHUB_RUN_ID})."
          echo
          echo "<details><summary>Artifacts</summary>"
          echo
          while IFS= read -r artifact; do
            rel="${artifact#${GITHUB_WORKSPACE}/}"
            echo "- \`${rel}\`"
          done < "${artifacts_file}"
          echo
          echo "</details>"
          echo
          echo "_Posted by the [evidence GitHub Action](https://github.com/sunnypurewal/evidence)._"
        } > "${body_file}"

        if [ -z "${PR_NUMBER}" ]; then
          echo "::warning::Could not determine pull request number; skipping comment."
          exit 0
        fi

        if command -v gh >/dev/null 2>&1; then
          gh api -X POST \
            "/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="$(cat "${body_file}")"
        else
          payload="$(BODY_FILE="${body_file}" python3 -c 'import json,os; print(json.dumps({"body": open(os.environ["BODY_FILE"]).read()}))')"
          curl -sSf -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --data "${payload}"
        fi

    - name: Shut down simulator
      if: ${{ always() && steps.simulator.outputs.udid != '' }}
      shell: bash
      run: |
        xcrun simctl shutdown "${{ steps.simulator.outputs.udid }}" >/dev/null 2>&1 || true
