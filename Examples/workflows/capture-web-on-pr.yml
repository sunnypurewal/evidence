name: Capture web screenshots on PR

# Drop this file into your web app repo at .github/workflows/capture-web-on-pr.yml.
# It starts a local HTTP server, then runs the evidence CLI on every pull request
# and posts a comment with the resulting screenshots so reviewers see proof the
# change renders correctly.

on:
  pull_request:
    branches:
      - main

jobs:
  capture-web:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Check out app code
        uses: actions/checkout@v4

      - name: Start local HTTP server
        run: python3 -m http.server 8765 &

      - name: Capture web screenshots
        uses: RiddimSoftware/evidence@v0
        with:
          subcommand: capture-web
          platform: web
          comment-on-pr: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
