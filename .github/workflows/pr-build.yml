name: pr-build

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-build:
    name: pr-build
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build 2>&1 | tee /tmp/swift-build.log; exit "${PIPESTATUS[0]}"

      - name: Test
        run: swift test 2>&1 | tee /tmp/swift-test.log; exit "${PIPESTATUS[0]}"
