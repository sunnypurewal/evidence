name: swift-test

on:
  push:
    branches:
      - main
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/swift-test.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ["self-hosted","macOS"]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift Package Manager artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Show Swift toolchain
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

      - name: Upload .build on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-debug-${{ github.run_id }}
          path: .build/debug/
          if-no-files-found: ignore
          retention-days: 7
