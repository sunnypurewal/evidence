name: swift-test

on:
  pull_request:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/swift-test.yml'
  push:
    branches:
      - main
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/swift-test.yml'

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ["self-hosted","macOS"]
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

      - name: Upload .build on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-debug-${{ github.run_id }}
          path: .build/debug/
          if-no-files-found: ignore
          retention-days: 7
